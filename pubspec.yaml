name: yt_offline
description: "Lecteur audio offline (YouTube -> local) — Flutter, iOS-ready."
publish_to: "none"
version: 1.2.0+3 # Augmenter le +2 et la version a chaque fois

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # État / injection simple
  provider: ^6.1.2

  # Extraction YouTube (pur Dart, Android + iOS)
  # 3.x : nécessaire pour choisir un client non-bridé (téléchargements rapides).
  youtube_explode_dart: ^3.1.0

  # Lecture audio (Android + iOS)
  just_audio: ^0.9.42
  # Fond + notification média + contrôles écran verrouillé
  audio_service: ^0.18.18

  # Base locale (pas de code-gen)
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4

  # Lecture vidéo hors-ligne (MP4 téléchargés)
  # Épinglé à 2.9.5 : la version suivante (video_player_android 2.9.6+) migre
  # vers le "built-in Kotlin" d'AGP 9, incompatible avec audio_service qui ne
  # l'a pas encore adopté (voir dependency_overrides ci-dessous).
  video_player: 2.9.5
  # Garde l'écran allumé pendant la lecture vidéo
  wakelock_plus: ^1.5.2

  # Import / export de la bibliothèque (backup .zip)
  archive: ^3.6.1
  file_picker: 10.3.10

  # Téléchargement des miniatures (stockage local pour les vidéos)
  http: ^1.2.2

  # Mise à jour in-app (GitHub Releases) hors Play Store
  package_info_plus: ^9.0.1
  open_filex: ^4.7.0

  # Divers
  cached_network_image: ^3.4.1
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2   # persistance des réglages (thème)
  url_launcher: ^6.3.0         # ouvrir le lien Buy me a coffee

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

# audio_service n'a pas encore migré vers le "built-in Kotlin" d'AGP 9
# (android.builtInKotlin=false dans android/gradle.properties). Ces deux
# plugins doivent donc rester sur une version pré-migration pour compiler.
dependency_overrides:
  video_player_android: 2.9.5

flutter:
  uses-material-design: true

# Génération des icônes d'app (Android + iOS) à partir de ton logo.
# 1) Dépose ton image en 1024x1024 ici : assets/icon/app_icon.png
# 2) Lance :  dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  # Fond utilisé pour l'icône iOS (pas de transparence autorisée sur iOS)
  background_color_ios: "#1A1A1A"
